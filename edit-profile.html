<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — SkillBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    main { padding-top: 64px; background: #f7f8fa; min-height: 100vh; }

    .ep-hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0a2617 100%);
      padding: 44px 0 36px;
      color: white;
    }
    .ep-hero h1 { font-size: 2rem; font-weight: 800; color: white; margin-bottom: 6px; }
    .ep-hero p { color: rgba(255,255,255,0.6); font-size: 0.95rem; }

    .ep-body { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    .ep-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .ep-card h2 {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e8e8e8; border-radius: 10px;
      font-size: 0.9rem; font-family: inherit; color: #1a1a2e; background: #fff;
      transition: border-color .2s; box-sizing: border-box;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none; border-color: #1dbf73;
    }
    .form-group textarea { resize: vertical; min-height: 90px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Skills section */
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 36px; padding: 8px 0; }
    .skill-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: rgba(29,191,115,0.1); color: #16a060;
      border-radius: 20px; font-size: 0.8rem; font-weight: 700;
    }
    .skill-tag button {
      background: none; border: none; cursor: pointer; color: #e53e3e;
      font-size: 1rem; line-height: 1; padding: 0;
    }
    .skill-input-row { display: flex; gap: 10px; }
    .skill-input-row input { flex: 1; }

    /* Projects section */
    .project-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 14px; padding: 16px; background: #f8f9fa; border-radius: 12px; margin-bottom: 12px;
    }
    .project-item-info h4 { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; color: #1a1a2e; }
    .project-item-info p { font-size: 0.82rem; color: #888; margin: 0; }
    .project-delete-btn {
      background: none; border: none; cursor: pointer; color: #e53e3e; font-size: 1.2rem;
      padding: 4px; border-radius: 6px; flex-shrink: 0;
    }

    .add-project-form {
      border: 1.5px dashed #d0d0d0; border-radius: 12px; padding: 20px;
      margin-top: 16px; display: none;
    }
    .add-project-form.open { display: block; }

    .btn-add-project {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 10px; border: 1.5px solid rgba(29,191,115,0.3);
      background: rgba(29,191,115,0.06); color: #16a060; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-add-project:hover { background: rgba(29,191,115,0.12); }

    .save-btn {
      display: block; width: 100%; padding: 14px;
      background: #1dbf73; color: white; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 800; cursor: pointer; transition: background .2s;
    }
    .save-btn:hover { background: #16a060; }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a1a2e; color: white;
      padding: 12px 20px; border-radius: 12px; font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 9999;
      transform: translateY(20px); opacity: 0; transition: all .3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #1dbf73; }

    .avatar-preview {
      width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
      background: #1dbf73; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 900; color: white; flex-shrink: 0;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

    .photo-row { display: flex; align-items: center; gap: 20px; }
    .photo-change-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 10px; border: 1.5px solid #e0e0e0;
      background: #fff; color: #555; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }

    .tech-chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .tech-chip-rm {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      background: #f0f0f0; border-radius: 8px; font-size: 0.8rem; font-weight: 600; color: #555;
    }
    .tech-chip-rm button { background: none; border: none; cursor: pointer; color: #999; font-size: 0.9rem; padding: 0; }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">SkillBridge</a>
      <ul class="nav-menu" id="nav-menu-list"></ul>
      <div class="nav-cta"></div>
      <button class="mobile-toggle" id="mobile-hamburger" aria-label="Toggle Menu">
        <span class="hamburger-line"></span><span class="hamburger-line"></span>
      </button>
    </div>
  </header>
  <div class="mobile-drawer-overlay" id="mobile-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer-menu">
    <ul class="mobile-nav-list"></ul>
  </div>

  <main>
    <div class="ep-hero">
      <div class="container">
        <h1>Edit Your Profile</h1>
        <p>Keep your profile up to date so clients find you.</p>
      </div>
    </div>

    <div class="ep-body" id="ep-body">
      <div style="text-align:center;padding:60px 0;color:#888;">Loading your profile…</div>
    </div>
  </main>

  <div class="toast" id="ep-toast"></div>

  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script>
  (function() {
    const session = window.SessionManager.getActiveUser();
    if (!session || session.role !== 'candidate') {
      window.location.href = 'index.html';
      return;
    }

    let candidate = window.CandidatesDB.getById(session.user.id);
    if (!candidate) { window.location.href = 'index.html'; return; }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('ep-toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.className = 'toast', 2800);
    }

    function avatarHtml(av, initial) {
      if (av && av.startsWith('data:')) {
        return `<img src="${av}" alt="">`;
      }
      return initial;
    }

    function skillTagsHtml() {
      return (candidate.skills || []).map(s =>
        `<span class="skill-tag">${escH(s)} <button onclick="removeSkill('${escH(s)}')">×</button></span>`
      ).join('');
    }

    function render() {
      candidate = window.CandidatesDB.getById(session.user.id);
      const initial = candidate.name.charAt(0).toUpperCase();

      document.getElementById('ep-body').innerHTML = `
        <!-- Photo -->
        <div class="ep-card">
          <h2>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile Photo
          </h2>
          <div class="photo-row">
            <div class="avatar-preview" id="ep-avatar-preview">${avatarHtml(candidate.avatar, initial)}</div>
            <div>
              <label class="photo-change-btn" for="ep-photo-input">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Change Photo
              </label>
              <input type="file" id="ep-photo-input" accept="image/*" style="display:none;">
              <p style="font-size:0.78rem;color:#aaa;margin:8px 0 0;">JPG, PNG or WEBP · Max 4MB</p>
            </div>
          </div>
        </div>

        <!-- About -->
        <div class="ep-card">
          <h2>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            About Me
          </h2>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="ep-name" value="${escH(candidate.name)}" placeholder="Your name">
            </div>
            <div class="form-group">
              <label>Role / Title</label>
              <input type="text" id="ep-role" value="${escH(candidate.role)}" placeholder="e.g. Frontend Developer">
            </div>
          </div>
          <div class="form-group">
            <label>Hourly Rate (₹)</label>
            <input type="number" id="ep-rate" value="${candidate.hourlyRate || ''}" min="0" step="50" placeholder="e.g. 800">
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea id="ep-bio" placeholder="Tell clients about yourself, your experience, and what you do best...">${escH(candidate.about || '')}</textarea>
          </div>
        </div>

        <!-- Technical Skills -->
        <div class="ep-card">
          <h2>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Technical Skills
          </h2>
          <div class="skills-wrap" id="skills-wrap">${skillTagsHtml()}</div>
          <div class="skill-input-row">
            <input type="text" id="skill-input" placeholder="Add a skill (e.g. React, Python, Figma…)" maxlength="40"
              onkeydown="if(event.key==='Enter'){event.preventDefault();addSkill();}">
            <button class="btn btn-primary" style="padding:8px 18px;font-size:0.85rem;" onclick="addSkill()">Add</button>
          </div>
        </div>

        <!-- Contact Info -->
        <div class="ep-card">
          <h2>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Contact Info
          </h2>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="ep-email" value="${escH(candidate.contact?.email || '')}" placeholder="you@example.com">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>LinkedIn URL</label>
              <input type="url" id="ep-linkedin" value="${escH(candidate.contact?.linkedin || '')}" placeholder="https://linkedin.com/in/…">
            </div>
            <div class="form-group">
              <label>GitHub URL</label>
              <input type="url" id="ep-github" value="${escH(candidate.contact?.github || '')}" placeholder="https://github.com/…">
            </div>
          </div>
        </div>

        <!-- Projects -->
        <div class="ep-card">
          <h2>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Projects &amp; Work
            <span style="margin-left:auto;font-size:0.78rem;font-weight:600;color:#888;">${(candidate.projects||[]).length} project${(candidate.projects||[]).length===1?'':'s'}</span>
          </h2>
          <div id="ep-projects-list">
            ${(candidate.projects || []).length === 0 ? '<p style="color:#aaa;font-size:0.88rem;margin-bottom:12px;">No projects yet. Add your first one below!</p>' :
              (candidate.projects || []).map(p => {
                const thumb = p.thumbnail || p.screenshot || '';
                const hasImg = thumb && (thumb.startsWith('data:') || thumb.startsWith('assets/') || thumb.startsWith('http'));
                return `
                <div class="project-item" style="align-items:center;">
                  ${hasImg ? `<img src="${escH(thumb)}" alt="" style="width:72px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;">` : `<div style="width:72px;height:52px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`}
                  <div class="project-item-info" style="flex:1;">
                    <h4>${escH(p.name)}</h4>
                    <p>${escH((p.description||'').slice(0,80))}${(p.description||'').length > 80 ? '…' : ''}</p>
                  </div>
                  <button class="project-delete-btn" onclick="removeProject('${escH(p.id)}')">×</button>
                </div>`;
              }).join('')
            }
          </div>

          <button class="btn-add-project" onclick="toggleAddProject()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Project
          </button>

          <div class="add-project-form" id="add-project-form">
            <div class="form-group">
              <label>Project Name <span style="color:#e53e3e">*</span></label>
              <input type="text" id="np-name" placeholder="e.g. E-commerce Dashboard">
            </div>

            <!-- Thumbnail Upload -->
            <div class="form-group">
              <label>Project Screenshot / Image</label>
              <div style="display:flex;align-items:center;gap:16px;margin-top:4px;">
                <div id="np-thumb-preview" style="width:120px;height:80px;border-radius:10px;background:#f5f5f5;border:2px dashed #ddd;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <div>
                  <label for="np-thumb-input" style="display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;background:rgba(29,191,115,0.08);color:#16a060;border:1.5px solid rgba(29,191,115,0.25);font-weight:700;font-size:0.82rem;cursor:pointer;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Choose Image
                  </label>
                  <input type="file" id="np-thumb-input" accept="image/*" style="display:none;">
                  <p style="font-size:0.75rem;color:#aaa;margin:6px 0 0;">JPG, PNG, WEBP · Max 5MB</p>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Description <span style="color:#e53e3e">*</span></label>
              <textarea id="np-desc" placeholder="What did you build? What problem does it solve?" style="min-height:80px;"></textarea>
            </div>

            <div style="display:flex;gap:10px;">
              <button class="btn btn-primary" style="padding:10px 22px;" onclick="saveProject()">Save Project</button>
              <button class="btn btn-secondary" style="padding:10px 22px;" onclick="toggleAddProject()">Cancel</button>
            </div>
            <div id="np-error" style="color:#e53e3e;font-size:0.84rem;margin-top:8px;"></div>
          </div>
        </div>

        <!-- Save All -->
        <button class="save-btn" onclick="saveAll()">Save All Changes</button>
        <p style="text-align:center;margin-top:12px;">
          <a href="profile.html?id=${escH(candidate.id)}" style="color:#888;font-size:0.85rem;">View My Public Profile →</a>
        </p>
      `;

      // Bind photo upload
      document.getElementById('ep-photo-input').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) { showToast('File too large (max 4MB)', 'error'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          candidate.avatar = e.target.result;
          window.CandidatesDB.update(candidate);
          document.getElementById('ep-avatar-preview').innerHTML = `<img src="${e.target.result}" alt="">`;
          showToast('Photo updated!');
        };
        reader.readAsDataURL(file);
      });
    }

    window.addSkill = function() {
      const inp = document.getElementById('skill-input');
      const val = inp.value.trim();
      if (!val) return;
      candidate = window.CandidatesDB.getById(session.user.id);
      if (!candidate.skills) candidate.skills = [];
      if (!candidate.skills.includes(val)) {
        candidate.skills.push(val);
        window.CandidatesDB.update(candidate);
      }
      inp.value = '';
      document.getElementById('skills-wrap').innerHTML = skillTagsHtml();
    };

    window.removeSkill = function(skill) {
      candidate = window.CandidatesDB.getById(session.user.id);
      candidate.skills = (candidate.skills || []).filter(s => s !== skill);
      window.CandidatesDB.update(candidate);
      document.getElementById('skills-wrap').innerHTML = skillTagsHtml();
    };

    // Store thumbnail b64 while form is open
    let pendingThumb = '';

    window.toggleAddProject = function() {
      const f = document.getElementById('add-project-form');
      f.classList.toggle('open');
      if (!f.classList.contains('open')) {
        ['np-name','np-desc'].forEach(id => {
          const el = document.getElementById(id); if (el) el.value = '';
        });
        pendingThumb = '';
        const prev = document.getElementById('np-thumb-preview');
        if (prev) prev.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
        const err = document.getElementById('np-error'); if (err) err.textContent = '';
      } else {
        // Bind thumbnail input when form opens
        setTimeout(() => {
          const thumbInput = document.getElementById('np-thumb-input');
          if (thumbInput && !thumbInput._bound) {
            thumbInput._bound = true;
            thumbInput.addEventListener('change', function() {
              const file = this.files[0];
              if (!file) return;
              if (file.size > 5 * 1024 * 1024) {
                document.getElementById('np-error').textContent = 'Image too large (max 5MB)';
                return;
              }
              const reader = new FileReader();
              reader.onload = e => {
                pendingThumb = e.target.result;
                const prev = document.getElementById('np-thumb-preview');
                if (prev) prev.innerHTML = `<img src="${pendingThumb}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" alt="">`;
              };
              reader.readAsDataURL(file);
            });
          }
        }, 50);
      }
    };

    window.saveProject = function() {
      const name = document.getElementById('np-name').value.trim();
      const desc = document.getElementById('np-desc').value.trim();
      const errEl = document.getElementById('np-error');
      if (!name) { errEl.textContent = 'Project name is required.'; return; }
      if (!desc) { errEl.textContent = 'Description is required.'; return; }
      window.CandidatesDB.addProject(session.user.id, { name, description: desc, thumbnail: pendingThumb });
      pendingThumb = '';
      candidate = window.CandidatesDB.getById(session.user.id);
      showToast('Project added!');
      render();
    };

    window.removeProject = function(projId) {
      if (!confirm('Remove this project?')) return;
      window.CandidatesDB.removeProject(session.user.id, projId);
      candidate = window.CandidatesDB.getById(session.user.id);
      showToast('Project removed.');
      render();
    };

    window.saveAll = function() {
      candidate = window.CandidatesDB.getById(session.user.id);
      const name = document.getElementById('ep-name').value.trim();
      const role = document.getElementById('ep-role').value.trim();
      const rate = parseInt(document.getElementById('ep-rate').value) || candidate.hourlyRate;
      const about = document.getElementById('ep-bio').value.trim();
      const email = document.getElementById('ep-email').value.trim();
      const linkedin = document.getElementById('ep-linkedin').value.trim();
      const github = document.getElementById('ep-github').value.trim();
      if (!name) { showToast('Name cannot be empty.', 'error'); return; }
      candidate.name = name;
      candidate.role = role || candidate.role;
      candidate.hourlyRate = rate;
      candidate.about = about;
      candidate.contact = { email: email || candidate.contact?.email || '', linkedin, github };
      window.CandidatesDB.update(candidate);
      showToast('Profile saved successfully!');
    };

    function escH(str) {
      if (!str) return '';
      return String(str).replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[t]));
    }

    render();
  })();
  </script>
</body>
</html>

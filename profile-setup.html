<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Profile — SkillBridge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    main { padding-top: 80px; }

    .setup-body {
      max-width: 620px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Progress ring */
    .setup-progress-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px 24px;
    }
    .progress-ring-svg { flex-shrink: 0; }
    .progress-ring-track { fill: none; stroke: #f0f0f0; stroke-width: 5; }
    .progress-ring-fill {
      fill: none; stroke: #1dbf73; stroke-width: 5;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 0.5s ease;
    }
    .progress-ring-text {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 800;
      fill: #111;
    }
    .progress-label h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .progress-label p { color: var(--secondary-text); font-size: 0.85rem; }

    /* Step header */
    .step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .step-counter { font-size: 0.78rem; color: #aaa; font-weight: 600; letter-spacing: 0.04em; }

    /* Card */
    .setup-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 16px;
    }
    .setup-card h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; letter-spacing:-0.02em; }
    .setup-card > p { color: var(--secondary-text); font-size: 0.9rem; margin-bottom: 24px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 7px; color: var(--primary-text); }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem;
      color: var(--primary-text); background: #fafafa;
      outline: none; transition: all 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 3px rgba(29,191,115,0.08); }
    .form-group textarea { resize: vertical; min-height: 100px; }

    /* Skills pills */
    .skills-input-wrap {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 10px 14px; border: 1px solid var(--border-color);
      border-radius: 10px; background: #fafafa;
      cursor: text; min-height: 48px; align-items: center;
      transition: all 0.15s;
    }
    .skills-input-wrap:focus-within { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 3px rgba(29,191,115,0.08); }
    .skill-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(29,191,115,0.1); color: #15803d;
      border: 1px solid rgba(29,191,115,0.25);
      padding: 4px 10px; border-radius: 100px; font-size: 0.82rem; font-weight: 600;
    }
    .skill-chip button { background:none; border:none; cursor:pointer; color:inherit; padding:0 0 0 2px; opacity:0.6; font-size:1.1rem; }
    .skill-chip button:hover { opacity:1; }
    .skills-input-wrap input { border:none; background:transparent; outline:none; font-family:var(--font-body); font-size:0.88rem; min-width:100px; flex:1; }

    /* Action buttons */
    .setup-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-next {
      flex: 1; padding: 13px; font-size: 0.95rem; font-weight: 700;
      background: var(--accent-color); color: white; border: none;
      border-radius: 10px; cursor: pointer; transition: all 0.15s;
    }
    .btn-next:hover { background: #16a060; transform: translateY(-1px); }
    .btn-back {
      padding: 13px 20px; font-size: 0.95rem; font-weight: 700;
      background: transparent; color: #888; border: 1px solid #e0e0e0;
      border-radius: 10px; cursor: pointer; transition: all 0.15s;
    }
    .btn-back:hover { border-color: #bbb; color: #555; }
    .btn-skip {
      display: none; width: 100%; text-align: center; margin-top: 10px;
      font-size: 0.84rem; color: #aaa; background: none; border: none;
      cursor: pointer;
    }
    .btn-skip:hover { color: #888; text-decoration: underline; }
    .step-error {
      color: #e53e3e; font-size: 0.82rem; margin-top: 8px; display: none;
    }

    /* Step dots */
    .step-dots {
      display: flex; gap: 6px; justify-content: center; margin-top: 20px;
    }
    .step-dot-item {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e0e0e0; transition: background 0.2s;
    }
    .step-dot-item.active { background: var(--accent-color); width: 18px; border-radius: 4px; }
    .step-dot-item.done { background: rgba(29,191,115,0.4); }

    /* Final step */
    .setup-complete {
      text-align: center;
      padding: 24px 0;
    }
    .setup-complete-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(29,191,115,0.1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .setup-complete h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; }
    .setup-complete p { color: var(--secondary-text); max-width: 380px; margin: 0 auto 28px; }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <header id="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">SkillBridge</a>
      <ul class="nav-menu" id="nav-menu-list"></ul>
      <div class="nav-cta"></div>
      <button class="mobile-toggle" id="mobile-hamburger" aria-label="Toggle Menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>
  <div class="mobile-drawer-overlay" id="mobile-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer-menu">
    <ul class="mobile-nav-list"></ul>
    <div class="mobile-nav-cta"></div>
  </div>

  <main>
    <div class="setup-body">

      <!-- Progress Ring -->
      <div class="setup-progress-wrap">
        <svg class="progress-ring-svg" width="60" height="60" viewBox="0 0 60 60">
          <circle class="progress-ring-track" cx="30" cy="30" r="25"/>
          <circle class="progress-ring-fill" id="progress-ring" cx="30" cy="30" r="25"
            stroke-dasharray="157" stroke-dashoffset="157"/>
          <text class="progress-ring-text" x="50%" y="54%" text-anchor="middle" id="progress-pct">0%</text>
        </svg>
        <div class="progress-label">
          <h3 id="progress-title">Complete your profile</h3>
          <p id="progress-sub">A complete profile gets 3× more responses</p>
        </div>
      </div>

      <!-- Step card -->
      <div class="setup-card" id="setup-card">
        <div class="step-header">
          <span class="step-counter" id="step-counter">Step 1 of 4</span>
        </div>
        <div id="step-content"></div>
        <div class="setup-actions">
          <button class="btn-back" id="btn-back" onclick="prevStep()" style="display:none;">← Back</button>
          <button class="btn-next" id="btn-next" onclick="nextStep()">Continue</button>
        </div>
        <button class="btn-skip" id="btn-skip" onclick="skipStep()">I don't have a company — skip this step</button>
        <div class="step-error" id="step-error"></div>
      </div>

      <!-- Step dots -->
      <div class="step-dots" id="step-dots"></div>
    </div>
  </main>

  <footer id="site-footer">
    <div class="footer-bottom-strip">
      <div class="container footer-bottom-inner">
        <div class="footer-copy">&copy; 2026 SkillBridge. All rights reserved.</div>
      </div>
    </div>
  </footer>

  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script>
  let session, currentStep = 0, completedSteps = 0;
  let stepSkills = [];

  const FREELANCER_STEPS = [
    {
      id: 'about',
      title: 'About You',
      desc: 'Write a short bio to help clients understand who you are.',
      required: true,
      render: () => `
        <h2>About You</h2>
        <p>Write a short bio to help clients understand who you are.</p>
        <div class="form-group">
          <label for="s-about">Bio / About <span style="color:#e53e3e;">*</span></label>
          <textarea id="s-about" placeholder="I'm a frontend developer with 3+ years of experience building React apps...">${currentData().about || ''}</textarea>
        </div>
      `,
      save: () => ({ about: document.getElementById('s-about').value.trim() })
    },
    {
      id: 'skills',
      title: 'Your Skills',
      desc: 'Add skills to help clients find you.',
      required: true,
      render: () => {
        stepSkills = [...(currentData().skills || [])];
        return `
          <h2>Your Skills</h2>
          <p>Add at least one skill so clients can find you.</p>
          <div class="form-group">
            <label>Skills <span style="color:#e53e3e;">*</span> <span style="color:#aaa;font-weight:400;font-size:0.82rem;">(press Enter or comma to add)</span></label>
            <div class="skills-input-wrap" id="setup-skills-wrap">
              ${stepSkills.map(s => `<div class="skill-chip">${s}<button type="button" onclick="removeSetupSkill('${s}',this)">&times;</button></div>`).join('')}
              <input type="text" id="setup-skills-input" placeholder="e.g. React, Node.js, Python...">
            </div>
          </div>
        `;
      },
      afterRender: () => {
        const wrap = document.getElementById('setup-skills-wrap');
        const input = document.getElementById('setup-skills-input');
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            addSetupSkill(input.value);
            input.value = '';
          }
        });
        input.addEventListener('blur', () => {
          if (input.value.trim()) { addSetupSkill(input.value); input.value = ''; }
        });
        wrap.addEventListener('click', () => input.focus());
      },
      save: () => ({ skills: [...stepSkills] })
    },
    {
      id: 'rate',
      title: 'Hourly Rate',
      desc: 'Set your starting hourly rate.',
      required: true,
      render: () => `
        <h2>Your Hourly Rate</h2>
        <p>Set a starting rate. You can negotiate project-by-project.</p>
        <div class="form-group">
          <label for="s-rate">Hourly Rate (₹/hr) <span style="color:#e53e3e;">*</span></label>
          <input type="number" id="s-rate" placeholder="e.g. 800" min="1" value="${currentData().hourlyRate || ''}">
        </div>
      `,
      save: () => {
        const v = parseInt(document.getElementById('s-rate').value);
        return isNaN(v) ? {} : { hourlyRate: v };
      }
    },
    {
      id: 'contact',
      title: 'Your Links',
      desc: 'Add LinkedIn or GitHub so clients can learn more about you.',
      required: true,
      render: () => {
        const contact = currentData().contact || {};
        return `
          <h2>Professional Links</h2>
          <p>Add at least one — LinkedIn or GitHub — so clients can verify your work. <span style="color:#e53e3e;">*</span></p>
          <div class="form-group">
            <label for="s-linkedin">LinkedIn URL</label>
            <input type="url" id="s-linkedin" placeholder="https://linkedin.com/in/yourname" value="${contact.linkedin || ''}">
          </div>
          <div class="form-group">
            <label for="s-github">GitHub URL</label>
            <input type="url" id="s-github" placeholder="https://github.com/yourname" value="${contact.github || ''}">
          </div>
        `;
      },
      save: () => {
        const linkedin = document.getElementById('s-linkedin').value.trim();
        const github = document.getElementById('s-github').value.trim();
        const existing = currentData().contact || {};
        return { contact: { ...existing, linkedin, github } };
      }
    },
    {
      id: 'photo',
      title: 'Profile Photo',
      desc: 'Upload a photo so clients can recognise you.',
      required: true,
      render: () => `
        <h2>Upload Your Profile Photo</h2>
        <p>A real photo builds trust. This is required to complete your profile.</p>
        <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding:12px 0;">
          <label for="s-photo-input" id="photo-drop-zone" style="width:160px;height:160px;border-radius:50%;background:#f8f8f8;border:3px dashed #d0d0d0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s;">
            <svg id="photo-placeholder-icon" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="photo-upload-text" style="font-size:0.72rem;color:#bbb;margin-top:8px;text-align:center;line-height:1.4;padding:0 14px;">Click or drag<br>photo here</span>
            <img id="photo-preview-img" src="" alt="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </label>
          <input type="file" id="s-photo-input" accept="image/jpeg,image/png,image/webp" style="display:none;">
          <button type="button" onclick="document.getElementById('s-photo-input').click()" style="display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;background:rgba(29,191,115,0.08);color:#16a060;border:1.5px solid rgba(29,191,115,0.25);font-weight:700;font-size:0.88rem;cursor:pointer;font-family:inherit;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Choose Photo
          </button>
          <p id="photo-hint" style="font-size:0.78rem;color:#aaa;text-align:center;margin:0;">JPG, PNG or WEBP · Max 4MB</p>
          <p id="photo-name" style="font-size:0.82rem;color:#1dbf73;font-weight:600;margin:0;display:none;"></p>
        </div>
      `,
      afterRender: () => {
        const input = document.getElementById('s-photo-input');
        const dropZone = document.getElementById('photo-drop-zone');
        if (!input) return;

        const existing = currentData().avatar;
        if (existing && existing.startsWith('data:')) {
          document.getElementById('photo-preview-img').src = existing;
          document.getElementById('photo-preview-img').style.display = 'block';
          document.getElementById('photo-placeholder-icon').style.display = 'none';
          document.getElementById('photo-upload-text').style.display = 'none';
          dropZone.style.borderColor = '#1dbf73';
          dropZone.style.background = '#f0fdf4';
        }

        function compressAndShow(file) {
          if (!file) return;
          if (!file.type.match(/^image\/(jpeg|jpg|png|webp)$/i)) {
            const h = document.getElementById('photo-hint');
            h.textContent = 'Please choose a JPG, PNG or WEBP image.'; h.style.color = '#e53e3e'; return;
          }
          if (file.size > 4 * 1024 * 1024) {
            const h = document.getElementById('photo-hint');
            h.textContent = 'File too large. Please choose an image under 4MB.'; h.style.color = '#e53e3e'; return;
          }
          const reader = new FileReader();
          reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
              const MAX = 400;
              const scale = Math.min(1, MAX / Math.max(img.width, img.height));
              const canvas = document.createElement('canvas');
              canvas.width = Math.round(img.width * scale);
              canvas.height = Math.round(img.height * scale);
              canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
              const compressed = canvas.toDataURL('image/jpeg', 0.82);

              document.getElementById('photo-preview-img').src = compressed;
              document.getElementById('photo-preview-img').style.display = 'block';
              document.getElementById('photo-placeholder-icon').style.display = 'none';
              document.getElementById('photo-upload-text').style.display = 'none';
              dropZone.style.borderColor = '#1dbf73';
              dropZone.style.background = '#f0fdf4';

              const nameEl = document.getElementById('photo-name');
              nameEl.textContent = '✓ ' + file.name;
              nameEl.style.display = 'block';

              const h = document.getElementById('photo-hint');
              h.textContent = 'JPG, PNG or WEBP · Max 4MB'; h.style.color = '#aaa';
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }

        input.addEventListener('change', () => compressAndShow(input.files[0]));

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#1dbf73'; dropZone.style.background = '#f0fdf4'; });
        dropZone.addEventListener('dragleave', () => { if (!document.getElementById('photo-preview-img').src.startsWith('data:')) { dropZone.style.borderColor = '#d0d0d0'; dropZone.style.background = '#f8f8f8'; } });
        dropZone.addEventListener('drop', e => { e.preventDefault(); compressAndShow(e.dataTransfer.files[0]); });
      },
      save: () => {
        const img = document.getElementById('photo-preview-img');
        if (img && img.src && img.src.startsWith('data:')) {
          return { avatar: img.src };
        }
        return {};
      }
    }
  ];

  const CLIENT_STEPS = [
    {
      id: 'company',
      title: 'Your Company',
      desc: 'Tell freelancers a bit about your company.',
      required: false,
      skippable: true,
      render: () => `
        <h2>Your Company</h2>
        <p>Help freelancers understand who they'd be working with. You can skip this if you're hiring as an individual.</p>
        <div class="form-group">
          <label for="s-company">Company Name</label>
          <input type="text" id="s-company" placeholder="e.g. Acme Corp" value="${currentData().company || ''}">
        </div>
      `,
      save: () => ({ company: document.getElementById('s-company').value.trim() })
    },
    {
      id: 'about-client',
      title: 'About Your Work',
      desc: 'What kind of projects do you typically hire for?',
      required: true,
      render: () => `
        <h2>What Do You Build?</h2>
        <p>Help freelancers understand the type of work you bring. <span style="color:#e53e3e;">*</span></p>
        <div class="form-group">
          <label for="s-about">About / Description</label>
          <textarea id="s-about" placeholder="We build SaaS products and need freelancers for design, frontend, and backend work...">${currentData().about || ''}</textarea>
        </div>
      `,
      save: () => ({ about: document.getElementById('s-about').value.trim() })
    },
    {
      id: 'photo',
      title: 'Profile Photo',
      desc: 'Upload a profile photo.',
      required: true,
      render: () => `
        <h2>Upload Your Profile Photo</h2>
        <p>Help freelancers put a face to your name. This is required.</p>
        <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding:12px 0;">
          <label for="s-photo-input" id="photo-drop-zone" style="width:160px;height:160px;border-radius:50%;background:#f8f8f8;border:3px dashed #d0d0d0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s;">
            <svg id="photo-placeholder-icon" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="photo-upload-text" style="font-size:0.72rem;color:#bbb;margin-top:8px;text-align:center;line-height:1.4;padding:0 14px;">Click or drag<br>photo here</span>
            <img id="photo-preview-img" src="" alt="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </label>
          <input type="file" id="s-photo-input" accept="image/jpeg,image/png,image/webp" style="display:none;">
          <button type="button" onclick="document.getElementById('s-photo-input').click()" style="display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;background:rgba(29,191,115,0.08);color:#16a060;border:1.5px solid rgba(29,191,115,0.25);font-weight:700;font-size:0.88rem;cursor:pointer;font-family:inherit;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Choose Photo
          </button>
          <p id="photo-hint" style="font-size:0.78rem;color:#aaa;text-align:center;margin:0;">JPG, PNG or WEBP · Max 4MB</p>
          <p id="photo-name" style="font-size:0.82rem;color:#1dbf73;font-weight:600;margin:0;display:none;"></p>
        </div>
      `,
      afterRender: () => {
        const input = document.getElementById('s-photo-input');
        const dropZone = document.getElementById('photo-drop-zone');
        if (!input) return;

        const existing = currentData().avatar;
        if (existing && existing.startsWith('data:')) {
          document.getElementById('photo-preview-img').src = existing;
          document.getElementById('photo-preview-img').style.display = 'block';
          document.getElementById('photo-placeholder-icon').style.display = 'none';
          document.getElementById('photo-upload-text').style.display = 'none';
          dropZone.style.borderColor = '#1dbf73';
          dropZone.style.background = '#f0fdf4';
        }

        function compressAndShow(file) {
          if (!file) return;
          if (!file.type.match(/^image\/(jpeg|jpg|png|webp)$/i)) {
            const h = document.getElementById('photo-hint');
            h.textContent = 'Please choose a JPG, PNG or WEBP image.'; h.style.color = '#e53e3e'; return;
          }
          if (file.size > 4 * 1024 * 1024) {
            const h = document.getElementById('photo-hint');
            h.textContent = 'File too large. Please choose an image under 4MB.'; h.style.color = '#e53e3e'; return;
          }
          const reader = new FileReader();
          reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
              const MAX = 400;
              const scale = Math.min(1, MAX / Math.max(img.width, img.height));
              const canvas = document.createElement('canvas');
              canvas.width = Math.round(img.width * scale);
              canvas.height = Math.round(img.height * scale);
              canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
              const compressed = canvas.toDataURL('image/jpeg', 0.82);

              document.getElementById('photo-preview-img').src = compressed;
              document.getElementById('photo-preview-img').style.display = 'block';
              document.getElementById('photo-placeholder-icon').style.display = 'none';
              document.getElementById('photo-upload-text').style.display = 'none';
              dropZone.style.borderColor = '#1dbf73';
              dropZone.style.background = '#f0fdf4';

              const nameEl = document.getElementById('photo-name');
              nameEl.textContent = '✓ ' + file.name;
              nameEl.style.display = 'block';

              const h = document.getElementById('photo-hint');
              h.textContent = 'JPG, PNG or WEBP · Max 4MB'; h.style.color = '#aaa';
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }

        input.addEventListener('change', () => compressAndShow(input.files[0]));

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#1dbf73'; dropZone.style.background = '#f0fdf4'; });
        dropZone.addEventListener('dragleave', () => { if (!document.getElementById('photo-preview-img').src.startsWith('data:')) { dropZone.style.borderColor = '#d0d0d0'; dropZone.style.background = '#f8f8f8'; } });
        dropZone.addEventListener('drop', e => { e.preventDefault(); compressAndShow(e.dataTransfer.files[0]); });
      },
      save: () => {
        const img = document.getElementById('photo-preview-img');
        if (img && img.src && img.src.startsWith('data:')) {
          return { avatar: img.src };
        }
        return {};
      }
    }
  ];

  function currentData() {
    if (!session) return {};
    if (session.role === 'candidate') return window.CandidatesDB.getById(session.user.id) || {};
    return window.RecruitersDB.getById(session.user.id) || {};
  }

  function getSteps() {
    return (session && session.role === 'recruiter') ? CLIENT_STEPS : FREELANCER_STEPS;
  }

  function addSetupSkill(s) {
    s = s.trim().replace(/,/g, '');
    if (!s || stepSkills.includes(s) || stepSkills.length >= 12) return;
    stepSkills.push(s);
    const wrap = document.getElementById('setup-skills-wrap');
    const input = document.getElementById('setup-skills-input');
    const chip = document.createElement('div');
    chip.className = 'skill-chip';
    chip.innerHTML = `${s}<button type="button" onclick="removeSetupSkill('${s}',this)">&times;</button>`;
    wrap.insertBefore(chip, input);
  }

  function removeSetupSkill(name, btn) {
    const i = stepSkills.indexOf(name);
    if (i !== -1) stepSkills.splice(i, 1);
    btn.parentElement.remove();
  }

  function updateProgress() {
    const steps = getSteps();
    const pct = Math.round((completedSteps / steps.length) * 100);
    const circumference = 2 * Math.PI * 25;
    const offset = circumference - (pct / 100) * circumference;
    document.getElementById('progress-ring').style.strokeDashoffset = offset;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-title').textContent = pct === 100 ? 'Profile complete!' : 'Complete your profile';
    document.getElementById('progress-sub').textContent = pct < 100
      ? `${steps.length - completedSteps} step${steps.length - completedSteps !== 1 ? 's' : ''} remaining`
      : 'You\'re all set!';
  }

  function renderStep() {
    const steps = getSteps();
    const step = steps[currentStep];
    if (!step) { showComplete(); return; }

    document.getElementById('step-counter').textContent = `Step ${currentStep + 1} of ${steps.length}`;
    document.getElementById('step-content').innerHTML = step.render();
    if (step.afterRender) step.afterRender();

    // Show/hide back button
    const backBtn = document.getElementById('btn-back');
    if (backBtn) backBtn.style.display = currentStep > 0 ? '' : 'none';

    // Show/hide skip button
    const skipBtn = document.getElementById('btn-skip');
    if (skipBtn) skipBtn.style.display = step.skippable ? 'block' : 'none';

    // Clear any previous error
    const errEl = document.getElementById('step-error');
    if (errEl) { errEl.textContent = ''; errEl.style.display = 'none'; }

    // dots
    const dots = document.getElementById('step-dots');
    dots.innerHTML = steps.map((_, i) => {
      let cls = 'step-dot-item';
      if (i < currentStep) cls += ' done';
      else if (i === currentStep) cls += ' active';
      return `<span class="${cls}"></span>`;
    }).join('');

    updateProgress();
  }

  function prevStep() {
    if (currentStep <= 0) return;
    currentStep--;
    renderStep();
  }

  function skipStep() {
    completedSteps = Math.max(completedSteps, currentStep + 1);
    currentStep++;
    renderStep();
  }

  function showStepError(msg) {
    const errEl = document.getElementById('step-error');
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  }

  function saveCurrentStep() {
    const steps = getSteps();
    const step = steps[currentStep];
    if (!step || !step.save) return;
    const data = step.save();
    if (Object.keys(data).length === 0) return;

    const current = currentData();
    const merged = { ...current, ...data };
    try {
      if (session.role === 'candidate') {
        window.CandidatesDB.save(merged);
      } else {
        window.RecruitersDB.update(merged);
      }
    } catch (err) {
      if (err.name === 'QuotaExceededError' || (err.message && err.message.toLowerCase().includes('quota'))) {
        const hint = document.getElementById('photo-hint');
        if (hint) { hint.textContent = 'Storage full — try a smaller image.'; hint.style.color = '#e53e3e'; }
        throw err;
      }
    }
  }

  function nextStep() {
    const steps = getSteps();
    const step = steps[currentStep];
    if (!step) return;

    // Clear previous error
    const errEl = document.getElementById('step-error');
    if (errEl) { errEl.textContent = ''; errEl.style.display = 'none'; }

    // Per-step validation
    if (step.id === 'about' || step.id === 'about-client') {
      const val = (document.getElementById('s-about') || {}).value || '';
      if (!val.trim()) { showStepError('Please write a short bio before continuing.'); return; }
    }

    if (step.id === 'skills') {
      if (stepSkills.length === 0) {
        const pending = (document.getElementById('setup-skills-input') || {}).value || '';
        if (pending.trim()) {
          addSetupSkill(pending.trim());
          document.getElementById('setup-skills-input').value = '';
        }
        if (stepSkills.length === 0) {
          showStepError('Please add at least one skill before continuing.'); return;
        }
      }
    }

    if (step.id === 'rate') {
      const rawVal = (document.getElementById('s-rate') || {}).value || '';
      const numVal = parseInt(rawVal);
      if (!rawVal.trim() || isNaN(numVal) || numVal < 1) {
        showStepError('Please enter your hourly rate (₹/hr) before continuing.'); return;
      }
    }

    if (step.id === 'contact') {
      const linkedin = ((document.getElementById('s-linkedin') || {}).value || '').trim();
      const github   = ((document.getElementById('s-github')   || {}).value || '').trim();
      if (!linkedin && !github) {
        showStepError('Please add at least one link — LinkedIn or GitHub — to continue.'); return;
      }
    }

    if (step.id === 'photo') {
      const img = document.getElementById('photo-preview-img');
      if (!img || !img.src || !img.src.startsWith('data:')) {
        const hint = document.getElementById('photo-hint');
        if (hint) { hint.textContent = 'Please upload a profile photo to continue.'; hint.style.color = '#e53e3e'; }
        return;
      }
    }

    try { saveCurrentStep(); } catch (e) { return; }
    completedSteps = Math.max(completedSteps, currentStep + 1);
    currentStep++;
    renderStep();
  }


  function showComplete() {
    updateProgress();

    // Mark profile as active and available now that setup is done
    const current = currentData();
    current.lastLoginAt = Date.now();
    if (session.role === 'candidate') {
      current.availability = 'Available';
      try { window.CandidatesDB.save(current); } catch(e) {}
    } else {
      try { window.RecruitersDB.update(current); } catch(e) {}
    }

    const dashUrl = session.role === 'recruiter' ? 'recruiter/dashboard.html' : 'candidate/dashboard.html';
    const browseUrl = session.role === 'recruiter' ? 'candidates.html' : 'browse-projects.html';

    document.getElementById('setup-card').innerHTML = `
      <div class="setup-complete">
        <div class="setup-complete-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>You're all set, ${session.user.name.split(' ')[0]}!</h2>
        <p>Your profile is ready. Start exploring SkillBridge and make your first move.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="${browseUrl}" class="btn btn-primary" style="border-radius:10px;">
            ${session.role === 'recruiter' ? 'Browse Freelancers' : 'Find Work'}
          </a>
          <a href="${dashUrl}" class="btn btn-secondary" style="border-radius:10px;">Go to Dashboard</a>
        </div>
      </div>
    `;
    document.getElementById('step-dots').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    session = window.SessionManager && window.SessionManager.getActiveUser();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    renderStep();
  });
  </script>
</body>
</html>

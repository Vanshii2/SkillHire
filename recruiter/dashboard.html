<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Dashboard — SkillBridge</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/footer.css">
  <style>
    main { padding-top: 64px; }

    .dash-hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0a2617 100%);
      padding: 40px 0 32px;
      color: white;
    }
    .dash-hero-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
    }
    .dash-welcome { display: flex; align-items: center; gap: 16px; }
    .dash-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent-color); color: #fff;
      font-size: 1.4rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading); flex-shrink: 0; overflow: hidden;
    }
    .dash-welcome-text h1 { font-size: 1.4rem; font-weight: 800; color: white; margin-bottom: 4px; letter-spacing: -0.02em; }
    .dash-welcome-text p { color: rgba(255,255,255,0.6); font-size: 0.88rem; }

    .mode-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(29,191,115,0.2); border: 1px solid rgba(29,191,115,0.4);
      border-radius: 100px; padding: 6px 14px;
      font-size: 0.8rem; font-weight: 700; color: #6effc0;
      letter-spacing: 0.02em;
    }
    .mode-dot { width: 7px; height: 7px; border-radius: 50%; background: #1dbf73; }

    .dash-body {
      max-width: 1100px; margin: 0 auto; padding: 36px 32px 80px;
    }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 36px;
    }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-card {
      background: #fff; border: 1px solid var(--border-color); border-radius: 16px;
      padding: 20px 22px;
    }
    .stat-card-num { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; color: #111; margin-bottom: 4px; }
    .stat-card-label { font-size: 0.82rem; color: var(--secondary-text); font-weight: 500; }

    /* Tabs */
    .dash-tabs {
      display: flex; gap: 4px; margin-bottom: 28px;
      border-bottom: 1px solid var(--border-color); padding-bottom: 0;
    }
    .dash-tab {
      padding: 10px 18px; font-size: 0.88rem; font-weight: 600;
      color: var(--secondary-text); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s;
      margin-bottom: -1px; border-radius: 0; font-family: var(--font-body);
    }
    .dash-tab:hover { color: #111; }
    .dash-tab.active { color: #1dbf73; border-bottom-color: #1dbf73; }

    /* Job cards */
    .job-card {
      background: #fff; border: 1px solid var(--border-color); border-radius: 16px;
      padding: 22px 24px; margin-bottom: 14px;
      display: flex; align-items: flex-start; gap: 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .job-card:hover { border-color: rgba(29,191,115,0.35); box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    .job-card-main { flex: 1; min-width: 0; }
    .job-card-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: #111; }
    .job-card-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.8rem; color: var(--secondary-text); margin-bottom: 10px; }
    .job-card-meta span { display: flex; align-items: center; gap: 4px; }
    .job-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-pill { padding: 3px 10px; border-radius: 100px; background: #f5f5f5; font-size: 0.75rem; font-weight: 500; color: #555; }
    .job-card-side { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .proposal-count {
      background: rgba(29,191,115,0.1); color: #16a060;
      border: 1px solid rgba(29,191,115,0.25); border-radius: 100px;
      padding: 5px 14px; font-size: 0.82rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .status-badge {
      display: inline-flex; padding: 3px 10px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700;
    }
    .status-open { background: rgba(29,191,115,0.08); color: #16a060; border: 1px solid rgba(29,191,115,0.2); }
    .status-closed { background: #f5f5f5; color: #888; border: 1px solid #e0e0e0; }

    .empty-state {
      text-align: center; padding: 60px 24px;
      background: #fafafa; border: 1px dashed var(--border-color); border-radius: 16px;
    }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: #111; }
    .empty-state p { color: var(--secondary-text); font-size: 0.88rem; margin-bottom: 20px; }

    /* Favourite candidates */
    .shortlist-card {
      display: flex; align-items: center; gap: 14px;
      background: #fff; border: 1px solid var(--border-color); border-radius: 14px;
      padding: 16px 18px; margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .shortlist-card:hover { border-color: rgba(29,191,115,0.35); }
    .shortlist-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #f5f5f5;
      object-fit: cover; flex-shrink: 0;
    }
    .shortlist-avatar-letter {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-color); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; flex-shrink: 0;
    }
    .shortlist-name { font-weight: 700; font-size: 0.92rem; color: #111; }
    .shortlist-role { font-size: 0.8rem; color: var(--secondary-text); }
    .shortlist-actions { margin-left: auto; display: flex; gap: 8px; }
  </style>
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <header id="site-header">
    <div class="nav-container">
      <a href="../index.html" class="logo">SkillBridge</a>
      <ul class="nav-menu" id="nav-menu-list"></ul>
      <div class="nav-cta" id="nav-cta-area"></div>
      <button class="mobile-toggle" id="mobile-hamburger" aria-label="Toggle Menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>
  <div class="mobile-drawer-overlay" id="mobile-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer-menu">
    <ul class="mobile-nav-list" id="mob-nav-list"></ul>
    <div class="mobile-nav-cta" id="mob-cta-area"></div>
  </div>

  <main>
    <!-- Hero -->
    <div class="dash-hero">
      <div class="dash-hero-inner">
        <div class="dash-welcome">
          <div class="dash-avatar" id="dash-avatar">?</div>
          <div class="dash-welcome-text">
            <h1 id="dash-name">Loading...</h1>
            <p id="dash-sub">Manage your projects and proposals</p>
          </div>
        </div>
        <div class="mode-badge" id="mode-badge">
          <span class="mode-dot"></span>
          <span id="mode-label">Client Mode</span>
        </div>
      </div>
    </div>

    <div class="dash-body">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-num" id="stat-posted">0</div>
          <div class="stat-card-label">Projects Posted</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="stat-proposals">0</div>
          <div class="stat-card-label">Total Proposals</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="stat-favourited">0</div>
          <div class="stat-card-label">Favourite Freelancers</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="dash-tabs">
        <button class="dash-tab active" onclick="showTab('posted')" id="tab-posted">My Posted Projects <span id="posted-badge" style="display:none;background:#e53e3e;color:#fff;border-radius:100px;font-size:0.68rem;font-weight:800;padding:1px 6px;margin-left:4px;">0</span></button>
        <button class="dash-tab" onclick="showTab('notifications')" id="tab-notifications">Responses <span id="notif-badge" style="display:none;background:#e53e3e;color:#fff;border-radius:100px;font-size:0.68rem;font-weight:800;padding:1px 6px;margin-left:4px;">0</span></button>
        <button class="dash-tab" onclick="showTab('favourited')" id="tab-favourited">Favourite Freelancers</button>
        <button class="dash-tab" onclick="showTab('escrow')" id="tab-escrow">Payments &amp; Escrow <span id="escrow-badge" style="display:none;background:#e53e3e;color:#fff;border-radius:100px;font-size:0.68rem;font-weight:800;padding:1px 6px;margin-left:4px;">0</span></button>
        <a href="../contracts.html" class="dash-tab" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          My Contracts
        </a>
      </div>

      <!-- Tab: Posted Projects -->
      <div id="panel-posted">
        <div id="posted-jobs-list"></div>
      </div>

      <!-- Tab: Notifications / Responses -->
      <div id="panel-notifications" style="display:none;">
        <div id="notifications-list"></div>
      </div>

      <!-- Tab: Favourite -->
      <div id="panel-favourited" style="display:none;">
        <div id="favourited-list"></div>
      </div>

      <!-- Tab: Escrow / Payments -->
      <div id="panel-escrow" style="display:none;">
        <div id="escrow-list"></div>
      </div>
    </div>
  </main>

  <footer id="site-footer">
    <div class="footer-bottom-strip">
      <div class="container footer-bottom-inner">
        <div class="footer-copy">&copy; 2026 SkillBridge. All rights reserved.</div>
      </div>
    </div>
  </footer>

  <script src="../js/db.js"></script>
  <script src="../js/main.js"></script>
  <script>
  // Module-level session — accessible by all global functions (handleProposal, sendCounter, etc.)
  let session = null;

  document.addEventListener('DOMContentLoaded', () => {
    session = window.SessionManager.getActiveUser();
    if (!session) { window.location.href = '../index.html'; return; }

    const mode = localStorage.getItem('skillbridge_mode') || (session.role === 'recruiter' ? 'client' : 'freelancer');
    const name = session.user.name || 'User';
    const initial = name.charAt(0).toUpperCase();

    const avEl = document.getElementById('dash-avatar');
    if (session.user.avatar && session.user.avatar.startsWith('data:')) {
      avEl.innerHTML = `<img src="${session.user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`;
    } else {
      avEl.textContent = initial;
    }
    document.getElementById('dash-name').textContent = 'Welcome back, ' + name.split(' ')[0] + '!';
    document.getElementById('mode-label').textContent = mode === 'client' ? 'Client Mode' : 'Freelancer Mode';

    // Load posted jobs
    const jobs = window.JobsDB.getByClient(session.user.id);
    const totalProposals = jobs.reduce((sum, j) => sum + (j.proposals || 0), 0);

    document.getElementById('stat-posted').textContent = jobs.length;
    document.getElementById('stat-proposals').textContent = totalProposals;

    // Favourite — read from RecruitersDB.savedCandidates (same source as profile/browse save buttons)
    const recruiterRecord = window.RecruitersDB.getById(session.user.id);
    const favourited = (recruiterRecord && recruiterRecord.savedCandidates) ? recruiterRecord.savedCandidates : [];
    document.getElementById('stat-favourited').textContent = favourited.length;

    renderPostedJobs(jobs);
    renderFavourite(favourited);

    // ── Responses tab badge: pending accept/counter proposals ──
    const myJobIds = new Set(jobs.map(j => j.id));
    const pendingResponses = (window.ProposalsDB ? window.ProposalsDB.getAll() : [])
      .filter(p => myJobIds.has(p.jobId) && p.status === 'pending' && (p.proposalType === 'accept' || p.proposalType === 'counter'));
    const notifBadge = document.getElementById('notif-badge');
    if (notifBadge) { notifBadge.textContent = pendingResponses.length; notifBadge.style.display = pendingResponses.length ? 'inline' : 'none'; }

    // ── Payments & Escrow tab badge: actions needed ──
    updateEscrowBadge(session.user.id);

    // ── My Posted Projects tab badge: new acceptances since last seen ──
    const newlyHired = (window.ProposalsDB ? window.ProposalsDB.getAll() : [])
      .filter(p => myJobIds.has(p.jobId) && p.status === 'accepted' && !localStorage.getItem('sb_seen_hire_' + p.id));
    const postedBadge = document.getElementById('posted-badge');
    if (postedBadge) { postedBadge.textContent = newlyHired.length; postedBadge.style.display = newlyHired.length ? 'inline' : 'none'; }

    // Listen for cross-tab localStorage changes (e.g., freelancer submits work → badge lights up)
    window.addEventListener('storage', () => {
      if (session) updateEscrowBadge(session.user.id);
    });
  });

  function updateEscrowBadge(clientId) {
    const allEscrow = window.EscrowDB ? window.EscrowDB.getByClient(clientId) : [];
    // Count escrows needing client action: awaiting payment OR work submitted for review
    const actionable = allEscrow.filter(e => e.status === 'awaiting_payment' || e.status === 'work_submitted');
    const b = document.getElementById('escrow-badge');
    if (b) { b.textContent = actionable.length; b.style.display = actionable.length ? 'inline' : 'none'; }
  }

  function renderPostedJobs(jobs) {
    const el = document.getElementById('posted-jobs-list');
    if (!jobs.length) {
      el.innerHTML = `
        <div class="empty-state">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="margin:0 auto 14px;display:block;" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>No Projects Posted Yet</h3>
          <p>Post your first project and start receiving proposals from top freelancers.</p>
          <a href="../post-project.html" class="btn btn-primary" style="border-radius:10px;">Post a Project</a>
        </div>`;
      return;
    }
    el.innerHTML = jobs.map(j => {
      const proposals = window.ProposalsDB ? window.ProposalsDB.getByJob(j.id) : [];
      const proposalCount = proposals.length;
      const statusClass = j.status === 'open' ? 'status-open' : 'status-closed';
      const statusLabel = j.status === 'open' ? 'Open' : 'Closed';
      const postedDate = new Date(j.postedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
      const skills = (j.skills || []).slice(0, 4).map(s => `<span class="skill-pill">${s}</span>`).join('');
      return `
        <div class="job-card" style="cursor:pointer;position:relative;">
          <div onclick="openProjectModal('${escH(j.id)}')" style="display:contents;">
          <div class="job-card-main">
            <div class="job-card-title">${escH(j.title)}</div>
            <div class="job-card-meta">
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                ${escH(j.budget)}
              </span>
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${escH(j.deadline)}
              </span>
              <span>Posted ${postedDate}</span>
            </div>
            ${skills ? `<div class="job-skills">${skills}</div>` : ''}
          </div>
          <div class="job-card-side">
            <div class="proposal-count">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1dbf73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              ${proposalCount} proposal${proposalCount !== 1 ? 's' : ''}
            </div>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          </div>
          <button onclick="deleteJob(event,'${escH(j.id)}')" title="Delete project"
            style="position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:#ccc;padding:4px;border-radius:6px;transition:color 0.15s,background 0.15s;"
            onmouseover="this.style.color='#e53e3e';this.style.background='#fff5f5'"
            onmouseout="this.style.color='#ccc';this.style.background='none'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>`;
    }).join('');
  }

  function renderFavourite(ids) {
    const el = document.getElementById('favourited-list');
    if (!ids.length) {
      el.innerHTML = `
        <div class="empty-state">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="margin:0 auto 14px;display:block;" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <h3>No Freelancers Favourite</h3>
          <p>Browse freelancers and bookmark profiles you'd like to work with.</p>
          <a href="../hire-talent.html" class="btn btn-secondary">Browse Freelancers</a>
        </div>`;
      return;
    }
    el.innerHTML = ids.map(id => {
      const c = window.CandidatesDB && window.CandidatesDB.getById(id);
      if (!c) return '';
      const initial = (c.name || '?').charAt(0).toUpperCase();
      return `
        <div class="shortlist-card">
          <div class="shortlist-avatar-letter">${initial}</div>
          <div>
            <div class="shortlist-name">${escH(c.name)}</div>
            <div class="shortlist-role">${escH(c.role || c.title || '')}</div>
          </div>
          <div class="shortlist-actions">
            <a href="../profile.html?id=${c.id}" class="btn btn-secondary" style="font-size:0.82rem;padding:6px 14px;">View Profile</a>
          </div>
        </div>`;
    }).filter(Boolean).join('');
  }

  function showTab(tab) {
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-posted').style.display = tab === 'posted' ? 'block' : 'none';
    document.getElementById('panel-notifications').style.display = tab === 'notifications' ? 'block' : 'none';
    document.getElementById('panel-favourited').style.display = tab === 'favourited' ? 'block' : 'none';
    document.getElementById('panel-escrow').style.display = tab === 'escrow' ? 'block' : 'none';
    if (tab === 'escrow') {
      renderEscrow();
      // Clear escrow badge when user opens the tab
      const eb = document.getElementById('escrow-badge');
      if (eb) eb.style.display = 'none';
    }
    if (tab === 'notifications') renderNotifications();
    if (tab === 'posted') {
      // Mark all hire notifications as seen
      const session2 = window.SessionManager && window.SessionManager.getActiveUser();
      if (session2) {
        const myJobs2 = window.JobsDB ? window.JobsDB.getByClient(session2.user.id) : [];
        const myJobIds2 = new Set(myJobs2.map(j => j.id));
        (window.ProposalsDB ? window.ProposalsDB.getAll() : [])
          .filter(p => myJobIds2.has(p.jobId) && p.status === 'accepted')
          .forEach(p => localStorage.setItem('sb_seen_hire_' + p.id, '1'));
      }
      const pb = document.getElementById('posted-badge');
      if (pb) pb.style.display = 'none';
    }
  }

  function renderNotifications() {
    const container = document.getElementById('notifications-list');
    const myJobs = window.JobsDB ? window.JobsDB.getAll().filter(j => j.clientId === session.user.id) : [];
    const myJobIds = new Set(myJobs.map(j => j.id));
    const allProposals = window.ProposalsDB ? window.ProposalsDB.getAll() : [];

    // Show pending accept/counter proposals from direct-hire jobs first, then all others
    const inviteResponses = allProposals.filter(p => myJobIds.has(p.jobId) && p.status === 'pending' && (p.proposalType === 'accept' || p.proposalType === 'counter'));
    const otherPending   = allProposals.filter(p => myJobIds.has(p.jobId) && p.status === 'pending' && p.proposalType !== 'accept' && p.proposalType !== 'counter');

    const byDate = (a, b) => new Date(b.submittedAt) - new Date(a.submittedAt);
    const sorted = [...inviteResponses.sort(byDate), ...otherPending.sort(byDate)];

    if (!sorted.length) {
      container.innerHTML = `<div style="text-align:center;padding:60px 16px;color:#aaa;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <p style="font-size:0.9rem;">No pending responses yet.<br>Invite a freelancer to get started.</p>
      </div>`;
      return;
    }

    container.innerHTML = sorted.map(p => {
      const job = window.JobsDB.getById(p.jobId);
      const jobTitle = job ? job.title : 'Unknown Project';
      const date = new Date(p.submittedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const isAccept  = p.proposalType === 'accept';
      const isCounter = p.proposalType === 'counter';
      const initial = (p.freelancerName || '?').charAt(0).toUpperCase();
      const hasPhoto = p.freelancerAvatar && p.freelancerAvatar.startsWith('data:');
      const avatarHtml = hasPhoto
        ? `<img src="${p.freelancerAvatar}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;" alt="">`
        : `<div style="width:42px;height:42px;border-radius:50%;background:#1dbf73;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">${initial}</div>`;

      const typeBadge = isAccept
        ? `<span style="padding:3px 10px;border-radius:100px;font-size:0.72rem;font-weight:800;background:rgba(29,191,115,0.1);color:#16a060;border:1px solid rgba(29,191,115,0.3);">✓ Accepted at your price</span>`
        : isCounter
        ? `<span style="padding:3px 10px;border-radius:100px;font-size:0.72rem;font-weight:800;background:#f0f4ff;color:#2d4a8a;border:1px solid #c7d4f0;">↔ Counter Offer</span>`
        : `<span style="padding:3px 10px;border-radius:100px;font-size:0.72rem;font-weight:800;background:#fff8e6;color:#b45309;border:1px solid #fde68a;">New Proposal</span>`;

      return `
        <div id="notif-card-${p.id}" style="background:#fff;border:1px solid ${isAccept ? 'rgba(29,191,115,0.35)' : isCounter ? '#c7d4f0' : '#eee'};border-radius:14px;padding:18px 20px;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            ${avatarHtml}
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:0.95rem;color:#111;">${escH(p.freelancerName)}</div>
              <div style="font-size:0.78rem;color:#888;margin-top:1px;">${escH(jobTitle)} · ${date}</div>
            </div>
            ${typeBadge}
          </div>
          <div style="display:flex;gap:16px;font-size:0.82rem;color:#555;margin-bottom:${p.coverLetter ? '10px' : '14px'};flex-wrap:wrap;">
            <span><strong style="color:#1dbf73;">₹${escH(p.proposedBudget || '—')}</strong></span>
            <span>Timeline: ${escH(p.proposedTimeline || '—')}</span>
          </div>
          ${p.coverLetter && !isAccept ? `<div style="font-size:0.82rem;color:#555;background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.55;">${escH(p.coverLetter)}</div>` : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button onclick="handleProposal('${p.id}','accepted')" style="flex:1;min-width:90px;padding:9px;border-radius:8px;background:#1dbf73;color:#fff;border:none;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
              ${isAccept ? 'Confirm & Create Escrow' : 'Accept'}
            </button>
            ${!isAccept ? `<button onclick="toggleCounter('${p.id}')" style="flex:1;min-width:90px;padding:9px;border-radius:8px;background:#f0faf5;color:#16a060;border:1.5px solid #b2dfc9;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">Counter</button>` : ''}
            <button onclick="handleProposal('${p.id}','declined')" style="flex:1;min-width:90px;padding:9px;border-radius:8px;background:#fff;color:#c53030;border:1.5px solid #fed7d7;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
              Decline
            </button>
          </div>
          <div id="counter-form-${p.id}" style="display:none;margin-top:10px;padding:12px;background:#fafafa;border:1.5px solid #e0e0e0;border-radius:10px;">
            <div style="font-size:0.8rem;font-weight:700;color:#333;margin-bottom:8px;">Send Counter Offer</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
              <div>
                <label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Your Budget (₹)</label>
                <input id="counter-budget-${p.id}" type="number" min="0" placeholder="e.g. 12000"
                  style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;">
              </div>
              <div>
                <label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Timeline</label>
                <input id="counter-timeline-${p.id}" type="text" placeholder="e.g. 3 weeks"
                  style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;">
              </div>
            </div>
            <textarea id="counter-msg-${p.id}" rows="2" placeholder="Explain your counter offer…"
              style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;resize:vertical;margin-bottom:8px;"></textarea>
            <div style="display:flex;gap:8px;">
              <button onclick="sendCounter('${p.id}','${p.freelancerId}')" style="flex:1;padding:7px;background:#1dbf73;color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.82rem;">Send Counter</button>
              <button onclick="toggleCounter('${p.id}')" style="padding:7px 14px;background:#fff;color:#888;border:1.5px solid #e0e0e0;border-radius:7px;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.82rem;">Cancel</button>
            </div>
          </div>
        </div>`;
    }).join('');

    // Update badge count
    const badge = document.getElementById('notif-badge');
    if (badge) {
      const count = sorted.length;
      badge.textContent = count;
      badge.style.display = count ? 'inline' : 'none';
    }
  }

  function renderEscrow() {
    const container = document.getElementById('escrow-list');
    const escrows = window.EscrowDB ? window.EscrowDB.getByClient(session.user.id) : [];
    if (!escrows.length) {
      container.innerHTML = `<div style="text-align:center;padding:48px 16px;color:#aaa;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <p>No escrow payments yet. Accept a proposal to get started.</p>
      </div>`;
      return;
    }
    const statusLabels = { awaiting_payment: 'Awaiting Payment', funded: 'Funded', work_submitted: 'Work Submitted', released: 'Released', disputed: 'Disputed' };
    const statusColors = { awaiting_payment: '#b45309', funded: '#1dbf73', work_submitted: '#3b82f6', released: '#16a060', disputed: '#e53e3e' };
    // Sort newest first
    const sortedEscrows = [...escrows].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    container.innerHTML = sortedEscrows.map(e => {
      const rawAmt = String(e.amount).replace(/[₹,\s]/g, '');
      const displayAmt = '₹' + rawAmt;
      const sub = JSON.parse(localStorage.getItem('sb_work_submission_' + e.id) || '{}');
      const hasSubmission = !!sub.submittedAt;
      const subDate = hasSubmission ? new Date(sub.submittedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : null;
      const borderColor = {funded:'rgba(29,191,115,0.4)',work_submitted:'rgba(59,130,246,0.4)',released:'rgba(22,160,96,0.3)',disputed:'rgba(229,62,62,0.3)'}[e.status] || '#e8e8e8';
      return `
      <div id="escrow-card-${e.id}" style="border:1.5px solid ${borderColor};border-radius:14px;padding:20px;margin-bottom:16px;background:#fff;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;">
          <div>
            <div style="font-weight:800;font-size:0.95rem;color:#1a1a2e;margin-bottom:3px;">${escH(e.jobTitle)}</div>
            <div style="font-size:0.82rem;color:#888;">Freelancer: <strong>${escH(e.freelancerName)}</strong></div>
          </div>
          <span style="padding:4px 12px;border-radius:100px;font-size:0.72rem;font-weight:700;background:${e.status==='work_submitted'?'rgba(59,130,246,0.1)':e.status==='released'?'rgba(22,160,96,0.1)':e.status==='disputed'?'rgba(229,62,62,0.08)':'rgba(29,191,115,0.08)'};color:${statusColors[e.status]||'#888'};">${statusLabels[e.status]||e.status}</span>
        </div>
        <div style="font-size:0.85rem;color:#555;margin-bottom:12px;">
          Amount: <strong style="color:#1dbf73;font-size:1rem;">${displayAmt}</strong>
          ${e.fundedAt ? ` · Funded: ${new Date(e.fundedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}` : ''}
          ${e.releasedAt ? ` · Released: ${new Date(e.releasedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}` : ''}
        </div>

        <!-- Status notification banners for client -->
        ${e.status === 'awaiting_payment' ? `
          <div style="padding:10px 14px;background:#fff8e6;border:1px solid #fde68a;border-radius:8px;font-size:0.82rem;color:#92400e;margin-bottom:14px;">
            ⏳ <strong>Action needed:</strong> Fund the escrow to activate this contract. The freelancer is waiting.
          </div>
        ` : e.status === 'funded' ? `
          <div style="padding:10px 14px;background:rgba(29,191,115,0.07);border:1px solid rgba(29,191,115,0.25);border-radius:8px;font-size:0.82rem;color:#16a060;margin-bottom:14px;">
            ✅ <strong>Payment confirmed.</strong> ${displayAmt} is secured in escrow. ${escH(e.freelancerName)} has been notified and will begin work.
          </div>
        ` : e.status === 'work_submitted' ? `
          <div style="padding:10px 14px;background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.25);border-radius:8px;font-size:0.82rem;color:#2563eb;margin-bottom:14px;">
            🔔 <strong>Work submitted</strong> on ${subDate || '—'}. Please review below and approve or request changes.
          </div>
        ` : e.status === 'released' ? `
          <div style="padding:10px 14px;background:rgba(22,160,96,0.07);border:1px solid rgba(22,160,96,0.25);border-radius:8px;font-size:0.82rem;color:#16a060;margin-bottom:14px;">
            🎉 <strong>Project complete!</strong> ${displayAmt} was released to ${escH(e.freelancerName)}${e.releasedAt ? ' on ' + new Date(e.releasedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : ''}.
          </div>
        ` : e.status === 'disputed' ? `
          <div style="padding:10px 14px;background:rgba(229,62,62,0.06);border:1px solid rgba(229,62,62,0.2);border-radius:8px;font-size:0.82rem;color:#c53030;margin-bottom:14px;">
            ⚠️ <strong>Dispute in progress.</strong> Our support team will contact both parties within 24–48 hours.
          </div>
        ` : ''}

        ${e.status === 'work_submitted' && hasSubmission ? `
          <div style="padding:14px;background:rgba(59,130,246,0.06);border:1.5px solid rgba(59,130,246,0.2);border-radius:10px;margin-bottom:14px;">
            <div style="font-size:0.78rem;font-weight:800;color:#2563eb;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">🔔 Work Submitted by Freelancer · ${subDate}</div>
            ${sub.message ? `<div style="font-size:0.83rem;color:#444;line-height:1.5;margin-bottom:8px;font-style:italic;">"${escH(sub.message.slice(0,200))}${sub.message.length>200?'…':''}"</div>` : ''}
            ${sub.fileName ? `<div style="font-size:0.78rem;color:#1dbf73;font-weight:600;margin-bottom:4px;">📎 ${escH(sub.fileName)}</div>` : ''}
            ${sub.liveLink ? `<div style="font-size:0.78rem;margin-bottom:4px;"><a href="${escH(sub.liveLink)}" target="_blank" style="color:#2563eb;font-weight:600;">🔗 View Live Link</a></div>` : ''}
          </div>
        ` : ''}

        <div id="escrow-actions-${e.id}">
          ${e.status === 'awaiting_payment' ? `
            <button onclick="fundEscrowFromPanel('${e.id}')" style="padding:8px 18px;background:#1dbf73;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">Fund Escrow</button>
          ` : e.status === 'funded' ? `
            <div style="padding:10px 14px;background:#fff8e6;border:1px solid #fde68a;border-radius:8px;font-size:0.81rem;color:#92400e;margin-bottom:12px;">
              ⚠️ Only release payment after reviewing and approving the freelancer's delivered work.
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="releasePayment('${e.id}')" style="padding:8px 18px;background:#0d1b2a;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">Release Payment</button>
              <button onclick="disputeEscrow('${e.id}')" style="padding:8px 18px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">Raise Dispute</button>
            </div>
          ` : e.status === 'work_submitted' ? `
            <div style="padding:10px 14px;background:#fff8e6;border:1px solid #fde68a;border-radius:8px;font-size:0.81rem;color:#92400e;margin-bottom:12px;">
              ⚠️ Review the freelancer's work above carefully. Only approve once satisfied.
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button onclick="releasePayment('${e.id}')" style="padding:8px 18px;background:#1dbf73;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">✓ Approve & Release</button>
              <button data-eid="${e.id}" data-fn="${escH(e.freelancerName)}" data-jt="${escH(e.jobTitle)}" onclick="requestRevision(this.dataset.eid,this.dataset.fn,this.dataset.jt)" style="padding:8px 18px;background:#fff;color:#0d1b2a;border:1.5px solid #cbd5e0;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">Request Revision</button>
              <button onclick="disputeEscrow('${e.id}')" style="padding:8px 18px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;">Raise Dispute</button>
            </div>
          ` : e.status === 'released' ? (() => {
            const alreadyRated = localStorage.getItem('sb_client_rated_' + e.id);
            // Freelancer's review of the client (if submitted)
            const cr = JSON.parse(localStorage.getItem('skillbridge_client_ratings') || '[]').find(r => r.escrowId === e.id);
            return `
            <div style="padding:10px 14px;background:rgba(22,160,96,0.07);border:1px solid rgba(22,160,96,0.25);border-radius:8px;font-size:0.82rem;color:#16a060;margin-bottom:14px;">
              🎉 <strong>Project complete!</strong> Payment was released to ${escH(e.freelancerName)}.
            </div>
            ${alreadyRated ? `
              <div style="font-size:0.82rem;color:#1dbf73;font-weight:600;margin-bottom:12px;">✓ You've rated ${escH(e.freelancerName)}.</div>
            ` : `
              <div id="crate-wrap-${e.id}" style="padding:16px;background:#fafafa;border:1.5px solid #e0e0e0;border-radius:12px;margin-bottom:12px;">
                <div style="font-size:0.85rem;font-weight:700;color:#111;margin-bottom:10px;">⭐ Rate your experience with ${escH(e.freelancerName)}</div>
                <div style="display:flex;gap:6px;margin-bottom:12px;" id="cstars-${e.id}">
                  ${[1,2,3,4,5].map(n => `<span onclick="setClientRating('${e.id}',${n})" style="font-size:1.6rem;cursor:pointer;opacity:0.3;transition:opacity 0.15s;" data-star="${n}">★</span>`).join('')}
                </div>
                <textarea id="crnote-${e.id}" style="width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:0.83rem;resize:none;box-sizing:border-box;" rows="2" placeholder="How was working with this freelancer? (optional)"></textarea>
                <button data-eid="${e.id}" data-fid="${escH(e.freelancerId)}" data-fn="${escH(e.freelancerName)}" data-jt="${escH(e.jobTitle)}"
                  onclick="submitClientRating(this.dataset.eid,this.dataset.fid,this.dataset.fn,this.dataset.jt)"
                  style="margin-top:10px;padding:9px 20px;background:#0d1b2a;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
                  Submit Rating
                </button>
              </div>
            `}
            ${cr ? `
              <div style="padding:12px 14px;background:#fafafa;border:1.5px solid #e0e0e0;border-radius:10px;">
                <div style="font-size:0.75rem;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:4px;">Freelancer's Review of You</div>
                <div style="font-size:1.05rem;color:#f59e0b;">${'★'.repeat(cr.rating)}${'☆'.repeat(5-cr.rating)}</div>
                ${cr.comment ? `<div style="font-size:0.82rem;color:#555;margin-top:4px;font-style:italic;">"${escH(cr.comment)}"</div>` : ''}
                <div style="font-size:0.75rem;color:#aaa;margin-top:4px;">— ${escH(cr.reviewerName)}</div>
              </div>
            ` : ''}`;
          })() :
             e.status === 'disputed' ? `<span style="color:#e53e3e;font-weight:700;">⚠ Dispute in Progress</span>` : ''}
        </div>
      </div>`;
    }).join('');
    // Refresh badge after re-render
    updateEscrowBadge(session.user.id);
  }

  function fundEscrowFromPanel(escrowId) {
    const e = window.EscrowDB && window.EscrowDB.getAll().find(x => x.id === escrowId);
    const rawAmt = e ? String(e.amount).replace(/[₹,\s]/g, '') : '0';
    const lbl = e ? (e.jobTitle || 'Project') : 'Escrow Payment';
    window.openPaymentModal(escrowId, rawAmt, lbl);
  }

  // ── Client rates freelancer ──────────────────────────────────────────
  let _clientRatings = {};
  function setClientRating(escrowId, n) {
    _clientRatings[escrowId] = n;
    document.querySelectorAll(`#cstars-${escrowId} [data-star]`).forEach(s => {
      s.style.opacity = parseInt(s.dataset.star) <= n ? '1' : '0.25';
    });
  }

  function submitClientRating(escrowId, freelancerId, freelancerName, jobTitle) {
    const stars = _clientRatings[escrowId];
    if (!stars) { alert('Please select a star rating first.'); return; }
    const note = (document.getElementById('crnote-' + escrowId)?.value || '').trim();
    // Use ReviewsDB.add which also updates the freelancer's computed avg rating on profile
    window.ReviewsDB.add(session.user.id, session.user.name || 'Client', freelancerId, stars, note);
    localStorage.setItem('sb_client_rated_' + escrowId, '1');
    const wrap = document.getElementById('crate-wrap-' + escrowId);
    if (wrap) wrap.innerHTML = `<div style="color:#1dbf73;font-weight:700;font-size:0.9rem;">✓ Rating submitted — ${'★'.repeat(stars)} Thank you!</div>`;
  }

  function releasePayment(escrowId) {
    const e = window.EscrowDB && window.EscrowDB.getAll().find(x => x.id === escrowId);
    const rawA = e ? String(e.amount).replace(/[₹,\s]/g, '') : '0';
    const amt = '₹' + rawA;
    const name = e ? e.freelancerName : 'the freelancer';
    _showReleaseModal(escrowId, amt, name);
  }

  function requestRevision(escrowId, freelancerName, jobTitle) {
    const note = prompt(`Request a revision from ${freelancerName}.\n\nDescribe what needs to be changed:`);
    if (!note || !note.trim()) return;
    const session = window.SessionManager && window.SessionManager.getActiveUser();
    const e = window.EscrowDB && window.EscrowDB.getAll().find(x => x.id === escrowId);
    if (e) {
      window.MessagesDB.send(
        session.user.id, session.user.name || 'Client', '', '',
        e.freelancerId,
        'Revision Requested: ' + jobTitle,
        `${session.user.name || 'The client'} has requested changes to your submission for "${jobTitle}".\n\nFeedback: ${note.trim()}\n\nPlease make the changes and resubmit from your My Contracts tab.`
      );
      window.EscrowDB.updateStatus(escrowId, 'funded');
      localStorage.removeItem('sb_work_submission_' + escrowId);
    }
    showDashToast('Revision request sent to the freelancer.', '#0d1b2a');
    renderEscrow();
  }

  function _showReleaseModal(escrowId, amt, freelancerName) {
    const existing = document.getElementById('_release-overlay');
    if (existing) existing.remove();
    const div = document.createElement('div');
    div.innerHTML = `
      <div id="_release-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);">
        <div style="background:#fff;border-radius:20px;max-width:380px;width:100%;padding:28px;box-shadow:0 24px 64px rgba(0,0,0,0.22);text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:#fff8e6;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div style="font-size:1.05rem;font-weight:800;color:#111;margin-bottom:8px;">Release ${amt} to ${freelancerName}?</div>
          <div style="font-size:0.85rem;color:#666;line-height:1.6;margin-bottom:20px;">These funds are currently held in escrow. Once released, they will be transferred to the freelancer. <strong>This cannot be undone.</strong></div>
          <div style="display:flex;gap:10px;">
            <button onclick="document.getElementById('_release-overlay').remove()" style="flex:1;padding:10px;border-radius:8px;background:#f5f5f5;color:#555;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.88rem;">Cancel</button>
            <button onclick="window._confirmRelease('${escrowId}')" style="flex:1;padding:10px;border-radius:8px;background:#1dbf73;color:#fff;border:none;font-weight:800;cursor:pointer;font-family:inherit;font-size:0.88rem;">Yes, Release</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(div.firstElementChild);
  }

  window._confirmRelease = function(escrowId) {
    document.getElementById('_release-overlay').remove();
    window.EscrowDB.updateStatus(escrowId, 'released', { releasedAt: new Date().toISOString() });
    showDashToast('Payment released to freelancer!', '#1dbf73');
    renderEscrow();
  };

  function disputeEscrow(escrowId) {
    window.EscrowDB.updateStatus(escrowId, 'disputed');
    showDashToast('Dispute raised. Our team will review.', '#e53e3e');
    renderEscrow();
  }

  function escH(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openProjectModal(jobId) {
    const job = window.JobsDB && window.JobsDB.getById(jobId);
    if (!job) return;
    const proposals = window.ProposalsDB ? window.ProposalsDB.getByJob(jobId) : [];

    const existing = document.getElementById('project-modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'project-modal-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);';

    const propCards = proposals.length ? proposals.map(p => {
      const date = new Date(p.submittedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      const statusColor = p.status === 'accepted' ? '#16a060' : p.status === 'declined' ? '#c53030' : '#b45309';
      const statusBg = p.status === 'accepted' ? 'rgba(29,191,115,0.08)' : p.status === 'declined' ? '#fff5f5' : '#fff8e6';
      const statusLabel = p.status === 'accepted' ? 'Accepted' : p.status === 'declined' ? 'Declined' : 'Pending';
      const initial = (p.freelancerName || '?').charAt(0).toUpperCase();
      const hasPhoto = p.freelancerAvatar && p.freelancerAvatar.startsWith('data:');
      const avatarHtml = hasPhoto
        ? `<img src="${p.freelancerAvatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;" alt="">`
        : `<div style="width:38px;height:38px;border-radius:50%;background:#1dbf73;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">${initial}</div>`;
      return `
        <div id="prop-${p.id}" style="border:1px solid #eee;border-radius:12px;padding:16px;margin-bottom:12px;">
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;">
            ${avatarHtml}
            <div style="flex:1;">
              <div style="font-weight:700;font-size:0.9rem;color:#111;">${escH(p.freelancerName)}</div>
              <div style="font-size:0.78rem;color:#888;">${escH(p.freelancerRole || '')}</div>
            </div>
            <span style="padding:3px 10px;border-radius:100px;font-size:0.72rem;font-weight:700;background:${statusBg};color:${statusColor};">${statusLabel}</span>
          </div>
          <div style="display:flex;gap:16px;font-size:0.8rem;color:#555;margin-bottom:8px;flex-wrap:wrap;align-items:center;">
            ${p.proposalType === 'accept' ? `<span style="padding:2px 9px;border-radius:100px;font-size:0.7rem;font-weight:800;background:rgba(29,191,115,0.1);color:#16a060;border:1px solid rgba(29,191,115,0.3);">✓ Accepted at listed price</span>` : p.proposalType === 'counter' ? `<span style="padding:2px 9px;border-radius:100px;font-size:0.7rem;font-weight:800;background:#f0f4ff;color:#2d4a8a;border:1px solid #c7d4f0;">↔ Counter Offer</span>` : ''}
            <span><strong style="color:#1dbf73;">₹${escH(p.proposedBudget || '—')}</strong></span>
            <span>Timeline: ${escH(p.proposedTimeline || '—')}</span>
            <span>${date}</span>
          </div>
          ${p.coverLetter ? `<div style="font-size:0.82rem;color:#555;line-height:1.55;background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:10px;">${escH(p.coverLetter)}</div>` : ''}
          ${p.status === 'pending' ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button onclick="handleProposal('${p.id}','accepted')" style="flex:1;min-width:90px;padding:8px;border-radius:8px;background:#1dbf73;color:#fff;border:none;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
              Accept
            </button>
            <button onclick="toggleCounter('${p.id}')" style="flex:1;min-width:90px;padding:8px;border-radius:8px;background:#f0faf5;color:#16a060;border:1.5px solid #b2dfc9;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
              Counter Offer
            </button>
            <button onclick="handleProposal('${p.id}','declined')" style="flex:1;min-width:90px;padding:8px;border-radius:8px;background:#fff;color:#c53030;border:1.5px solid #fed7d7;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">
              Decline
            </button>
          </div>
          <div id="counter-form-${p.id}" style="display:none;margin-top:10px;padding:12px;background:#fafafa;border:1.5px solid #e0e0e0;border-radius:10px;">
            <div style="font-size:0.8rem;font-weight:700;color:#333;margin-bottom:8px;">Send Counter Offer</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
              <div>
                <label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Your Budget (₹)</label>
                <input id="counter-budget-${p.id}" type="number" min="0" placeholder="e.g. 12000"
                  style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;">
              </div>
              <div>
                <label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Timeline</label>
                <input id="counter-timeline-${p.id}" type="text" placeholder="e.g. 3 weeks"
                  style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;">
              </div>
            </div>
            <textarea id="counter-msg-${p.id}" rows="2" placeholder="Explain your counter offer…"
              style="width:100%;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.82rem;box-sizing:border-box;resize:vertical;margin-bottom:8px;"></textarea>
            <div style="display:flex;gap:8px;">
              <button onclick="sendCounter('${p.id}','${p.freelancerId}')" style="flex:1;padding:7px;background:#1dbf73;color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.82rem;">Send Counter</button>
              <button onclick="toggleCounter('${p.id}')" style="padding:7px 14px;background:#fff;color:#888;border:1.5px solid #e0e0e0;border-radius:7px;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.82rem;">Cancel</button>
            </div>
          </div>` : ''}
        </div>`;
    }).join('') : `<div style="text-align:center;padding:32px 16px;color:#aaa;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <p style="font-size:0.88rem;">No proposals yet. Share your project link to attract freelancers.</p>
      </div>`;

    overlay.innerHTML = `
      <div style="background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18);">
        <div style="padding:24px 28px 16px;border-bottom:1px solid #eee;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;">
          <div>
            <div style="font-size:1.1rem;font-weight:800;color:#111;margin-bottom:4px;">${escH(job.title)}</div>
            <div style="font-size:0.8rem;color:#888;">${escH(job.category || '')} · ${escH(job.budget || '')} · ${escH(job.deadline || '')}</div>
          </div>
          <button onclick="document.getElementById('project-modal-overlay').remove()" style="background:none;border:none;cursor:pointer;color:#aaa;padding:4px;flex-shrink:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        ${job.description ? `<div style="padding:14px 28px;font-size:0.85rem;color:#555;line-height:1.6;border-bottom:1px solid #f0f0f0;">${escH(job.description)}</div>` : ''}
        <div style="padding:20px 28px;">
          <div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#aaa;margin-bottom:14px;">
            Proposals (${proposals.length})
          </div>
          ${propCards}
        </div>
      </div>`;

    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  function handleProposal(proposalId, status) {
    const proposal = window.ProposalsDB.getAll().find(p => p.id === proposalId);
    if (!proposal) { showDashToast('Proposal not found.', '#e53e3e'); return; }

    // Guard: prevent accepting a second proposal for the same job
    if (status === 'accepted') {
      const alreadyAccepted = window.ProposalsDB.getAll().some(
        p => p.jobId === proposal.jobId && p.id !== proposalId && p.status === 'accepted'
      );
      if (alreadyAccepted) {
        showDashToast('A proposal for this job is already accepted.', '#e53e3e');
        return;
      }
    }

    window.ProposalsDB.updateStatus(proposalId, status);

    const card = document.getElementById('prop-' + proposalId);
    if (card) {
      const statusColor = status === 'accepted' ? '#16a060' : '#c53030';
      const statusBg = status === 'accepted' ? 'rgba(29,191,115,0.08)' : '#fff5f5';
      const label = status === 'accepted' ? 'Accepted' : 'Declined';
      const badge = card.querySelector('span[style*="font-weight:700"]');
      if (badge) { badge.textContent = label; badge.style.color = statusColor; badge.style.background = statusBg; }
      const btns = card.querySelector('div[style*="gap:8px;flex-wrap:wrap"]');
      if (btns) btns.remove();
    }

    // On accept: create escrow, close the job, decline all other pending proposals
    if (status === 'accepted') {
      const job = window.JobsDB.getById(proposal.jobId);
      if (proposal && job) {
        // Close the job so no new applications come in
        window.JobsDB.updateStatus(proposal.jobId, 'in_progress');

        // Decline all other pending proposals for this job
        window.ProposalsDB.getAll()
          .filter(p => p.jobId === proposal.jobId && p.id !== proposalId && p.status === 'pending')
          .forEach(p => window.ProposalsDB.updateStatus(p.id, 'declined'));

        // Create escrow (with jobId stored)
        const esc = window.EscrowDB.create(
          proposalId, session.user.id, session.user.name,
          proposal.freelancerId, proposal.freelancerName,
          job.title, proposal.proposedBudget || '0', proposal.jobId
        );

        // Inject fund-escrow CTA into the card
        if (card) {
          const escDiv = document.createElement('div');
          escDiv.style.cssText = 'margin-top:10px;padding:12px;background:rgba(29,191,115,0.05);border:1.5px solid rgba(29,191,115,0.2);border-radius:10px;';
          escDiv.innerHTML = `
            <div style="font-size:0.82rem;font-weight:700;color:#16a060;margin-bottom:6px;">✓ Escrow Created</div>
            <div style="font-size:0.8rem;color:#555;margin-bottom:10px;">Amount: <strong>₹${escH(proposal.proposedBudget || '—')}</strong> — <a href="../contracts.html" style="color:#1dbf73;font-weight:600;">View in My Contracts →</a></div>
            <button onclick="fundEscrow('${esc.id}')" id="fund-btn-${esc.id}" style="padding:7px 16px;background:#1dbf73;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.82rem;">
              Fund Escrow Now
            </button>
          `;
          card.appendChild(escDiv);
        }
      }
    }

    // Also remove from notifications tab if it's open there
    const notifCard = document.getElementById('notif-card-' + proposalId);
    if (notifCard) {
      if (status === 'accepted') {
        notifCard.innerHTML = `<div style="padding:12px 16px;background:rgba(29,191,115,0.07);border-radius:10px;font-size:0.85rem;font-weight:700;color:#16a060;">✓ Accepted — Escrow created. <a href="../contracts.html" style="color:#1dbf73;">Fund escrow in My Contracts →</a></div>`;
      } else {
        notifCard.style.opacity = '0.4';
        setTimeout(() => notifCard.remove(), 300);
      }
      // Refresh badge count
      const remaining = document.querySelectorAll('[id^="notif-card-"]').length - 1;
      const badge = document.getElementById('notif-badge');
      if (badge) { badge.textContent = remaining; badge.style.display = remaining ? 'inline' : 'none'; }
    }

    // Mark accepted proposal as "unseen" so the My Posted Projects badge lights up
    if (status === 'accepted') {
      localStorage.removeItem('sb_seen_hire_' + proposalId);
      updateEscrowBadge(session.user.id);
    }
    showDashToast(status === 'accepted' ? '✓ Proposal accepted! Escrow created.' : 'Proposal declined.', status === 'accepted' ? '#1dbf73' : '#e53e3e');
  }

  function fundEscrow(escrowId) {
    const e = window.EscrowDB && window.EscrowDB.getAll().find(x => x.id === escrowId);
    const rawAmt = e ? String(e.amount).replace(/[₹,\s]/g, '') : '0';
    const lbl = e ? (e.jobTitle || 'Project') : 'Escrow Payment';
    window.openPaymentModal(escrowId, rawAmt, lbl);
  }

  function showDashToast(msg, bg) {
    const toast = document.createElement('div');
    toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:#fff;padding:10px 20px;border-radius:10px;font-weight:700;font-size:0.88rem;z-index:3000;box-shadow:0 4px 16px rgba(0,0,0,0.15);`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  function toggleCounter(proposalId) {
    const form = document.getElementById('counter-form-' + proposalId);
    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  function sendCounter(proposalId, freelancerId) {
    const budget = document.getElementById('counter-budget-' + proposalId).value.trim();
    const timeline = document.getElementById('counter-timeline-' + proposalId).value.trim();
    const msg = document.getElementById('counter-msg-' + proposalId).value.trim();
    if (!budget) { alert('Please enter a counter budget.'); return; }
    const proposal = window.ProposalsDB.getAll().find(p => p.id === proposalId);
    const job = proposal ? window.JobsDB.getById(proposal.jobId) : null;
    const company = session.user.company || session.user.name;
    window.MessagesDB.send(
      session.user.id, session.user.name, company, session.user.email,
      freelancerId, `Counter Offer: ${job ? job.title : 'Project'}`,
      `Hello ${proposal ? proposal.freelancerName : ''},\n\nI'd like to make a counter offer for this project.\n\nBudget: ₹${budget}\nTimeline: ${timeline || 'To be discussed'}\n\n${msg || 'Please let me know if you\'d like to proceed on these terms.'}`
    );
    // Mark proposal as countered (store info)
    const allProps = window.ProposalsDB.getAll();
    const idx = allProps.findIndex(p => p.id === proposalId);
    if (idx > -1) {
      allProps[idx].counterBudget = budget;
      allProps[idx].counterTimeline = timeline;
      allProps[idx].counterMsg = msg;
      allProps[idx].status = 'countered';
      localStorage.setItem('skillbridge_proposals', JSON.stringify(allProps)); // matches PROPOSALS_KEY in db.js
    }
    showDashToast('Counter offer sent to freelancer!', '#1dbf73');
    // Update the card status badge
    const card = document.getElementById('prop-' + proposalId);
    if (card) {
      const badge = card.querySelector('span[style*="font-weight:700"]');
      if (badge) { badge.textContent = 'Counter Sent'; badge.style.color = '#7c3aed'; badge.style.background = 'rgba(124,58,237,0.08)'; }
      const form = document.getElementById('counter-form-' + proposalId);
      if (form) form.remove();
      const btns = card.querySelector('div[style*="gap:8px;flex-wrap:wrap"]');
      if (btns) btns.remove();
    }
  }

  function deleteJob(e, jobId) {
    e.stopPropagation();
    const job = window.JobsDB.getById(jobId);
    if (!job) return;
    if (!confirm(`Delete "${job.title}"? This cannot be undone.`)) return;
    window.JobsDB.delete(jobId);
    showDashToast('Project deleted.', '#e53e3e');
    // Close modal if open
    const modal = document.getElementById('project-modal-overlay');
    if (modal) modal.remove();
    // Re-render
    const jobs = window.JobsDB.getByClient(session.user.id);
    renderPostedJobs(jobs);
  }
  </script>
</body>
</html>

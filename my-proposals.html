<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Proposals — SkillBridge</title>
  <meta name="description" content="View and track all the proposals you've submitted on SkillBridge.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    main { padding-top: 64px; }

    .mp-hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0a2617 100%);
      padding: 56px 0 44px;
      color: white;
    }
    .mp-hero h1 { font-size: clamp(1.8rem,4vw,2.6rem); font-weight:800; letter-spacing:-0.03em; color:white; margin-bottom:8px; }
    .mp-hero p { color:rgba(255,255,255,0.7); font-size:1rem; }

    .mp-body { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

    /* Tabs */
    .mp-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: #f5f5f5;
      padding: 4px;
      border-radius: 12px;
      width: fit-content;
    }
    .mp-tab-btn {
      padding: 8px 20px;
      border-radius: 9px;
      border: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--secondary-text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mp-tab-btn.active {
      background: white;
      color: var(--primary-text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* Proposal Card */
    .proposal-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .proposal-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

    .proposal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
    }

    .proposal-job-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary-text);
      margin-bottom: 4px;
    }

    .proposal-client {
      font-size: 0.82rem;
      color: var(--secondary-text);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-pending { background: rgba(245,158,11,0.1); color: #b45309; }
    .status-accepted { background: rgba(29,191,115,0.1); color: #15803d; }
    .status-rejected { background: rgba(239,68,68,0.1); color: #b91c1c; }

    .proposal-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .proposal-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      color: var(--secondary-text);
    }
    .proposal-meta-item strong { color: var(--primary-text); }

    .proposal-cover {
      font-size: 0.88rem;
      color: var(--secondary-text);
      line-height: 1.6;
      padding: 12px 14px;
      background: #fafafa;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .proposal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
    .proposal-date { font-size: 0.8rem; color: #999; }

    .btn-view-job {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--border-color);
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-text);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-view-job:hover { border-color: var(--accent-color); color: var(--accent-color); }

    /* Auth Gate */
    .auth-gate-large {
      background: linear-gradient(135deg, #0f0f0f 0%, #1c1c2e 100%);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      color: white;
    }
    .auth-gate-large h2 { color: white; font-size: 1.8rem; margin-bottom: 10px; }
    .auth-gate-large p { color: rgba(255,255,255,0.7); margin-bottom: 28px; }

    /* Empty */
    .no-proposals {
      text-align: center;
      padding: 64px 24px;
    }
    .no-proposals-icon { font-size: 3rem; margin-bottom: 16px; }
    .no-proposals h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .no-proposals p { color: var(--secondary-text); max-width: 360px; margin: 0 auto 24px; }

    /* Posted Projects (for clients) */
    .posted-job-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .posted-job-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .posted-job-header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:10px; }
    .posted-job-title { font-size: 1.05rem; font-weight: 700; color: var(--primary-text); }
    .posted-job-meta { font-size: 0.82rem; color: var(--secondary-text); margin-top: 4px; }
    .proposals-count-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:100px; background:rgba(29,191,115,0.1); color:#15803d; font-size:0.78rem; font-weight:600; }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- NAVBAR -->
  <header id="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">SkillBridge</a>
      <ul class="nav-menu" id="nav-menu-list"></ul>
      <div class="nav-cta"></div>
      <button class="mobile-toggle" id="mobile-hamburger" aria-label="Toggle Menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>
  <div class="mobile-drawer-overlay" id="mobile-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer-menu">
    <ul class="mobile-nav-list"></ul>
    <div class="mobile-nav-cta"></div>
  </div>

  <main>
    <div class="mp-hero">
      <div class="container">
        <h1>My Proposals</h1>
        <p>Track proposals you've submitted and projects you've posted.</p>
      </div>
    </div>

    <div class="mp-body">
      <!-- Auth gate (hidden when logged in) -->
      <div class="auth-gate-large" id="auth-gate" style="display:none;">
        <h2>Log in to view your proposals</h2>
        <p>Sign in to see proposals you've submitted or projects you've posted.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn" style="background:var(--accent-color);color:white;padding:12px 28px;border-radius:100px;font-weight:600;" onclick="window.openAuthModal('login')">Log In</button>
          <button class="btn" style="background:rgba(255,255,255,0.15);color:white;border:1.5px solid rgba(255,255,255,0.3);padding:12px 28px;border-radius:100px;font-weight:600;" onclick="window.openAuthModal('register')">Create Account</button>
        </div>
      </div>

      <!-- Content (shown when logged in) -->
      <div id="main-content" style="display:none;">
        <div class="mp-tabs">
          <button class="mp-tab-btn active" data-tab="submitted">Submitted Proposals</button>
          <button class="mp-tab-btn" data-tab="posted">My Posted Projects</button>
        </div>

        <div id="tab-submitted">
          <div id="submitted-list"></div>
        </div>
        <div id="tab-posted" style="display:none;">
          <div id="posted-list"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer id="site-footer">
    <div class="footer-top">
      <div class="container footer-top-inner">
        <a href="index.html" class="footer-logo">SkillBridge</a>
      </div>
    </div>
    <div class="footer-bottom-strip">
      <div class="container footer-bottom-inner">
        <div class="footer-copy">&copy; 2026 SkillBridge. All rights reserved.</div>
      </div>
    </div>
  </footer>

  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const session = window.SessionManager.getActiveUser();

    if (!session) {
      document.getElementById('auth-gate').style.display = 'block';
      return;
    }

    document.getElementById('main-content').style.display = 'block';
    renderSubmitted(session);
    renderPosted(session);

    // Tab switching
    document.querySelectorAll('.mp-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mp-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.getAttribute('data-tab');
        document.getElementById('tab-submitted').style.display = tab === 'submitted' ? 'block' : 'none';
        document.getElementById('tab-posted').style.display = tab === 'posted' ? 'block' : 'none';
      });
    });
  });

  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    return `${days}d ago`;
  }

  function statusBadge(status) {
    const map = {
      pending: ['status-pending', 'Pending'],
      accepted: ['status-accepted', 'Accepted'],
      rejected: ['status-rejected', 'Declined']
    };
    const [cls, label] = map[status] || map.pending;
    return `<span class="status-badge ${cls}">${label}</span>`;
  }

  function renderSubmitted(session) {
    const proposals = window.ProposalsDB.getByFreelancer(session.user.id);
    const el = document.getElementById('submitted-list');

    if (!proposals.length) {
      el.innerHTML = `
        <div class="no-proposals">
          <div class="no-proposals-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
          <h3>No proposals yet</h3>
          <p>Browse open projects and submit your first proposal to get hired.</p>
          <a href="browse-projects.html" class="btn btn-primary" style="margin-top:4px;">Browse Projects</a>
        </div>`;
      return;
    }

    el.innerHTML = proposals.map(p => {
      const job = window.JobsDB.getById(p.jobId);
      const jobTitle = job ? job.title : 'Project (removed)';
      const jobClient = job ? job.clientName : '—';
      return `
        <div class="proposal-card">
          <div class="proposal-header">
            <div>
              <div class="proposal-job-title">${jobTitle}</div>
              <div class="proposal-client">Client: ${jobClient}</div>
            </div>
            ${statusBadge(p.status)}
          </div>
          <div class="proposal-meta">
            <div class="proposal-meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <strong>${p.proposedBudget}</strong>
            </div>
            <div class="proposal-meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Timeline: <strong>${p.proposedTimeline}</strong>
            </div>
          </div>
          <div class="proposal-cover">${p.coverLetter}</div>
          <div class="proposal-footer">
            <div class="proposal-date">Submitted ${timeAgo(p.submittedAt)}</div>
            <a href="browse-projects.html" class="btn-view-job">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              Browse More
            </a>
          </div>
        </div>`;
    }).join('');
  }

  function renderPosted(session) {
    const jobs = window.JobsDB.getByClient(session.user.id);
    const el = document.getElementById('posted-list');

    if (!jobs.length) {
      el.innerHTML = `
        <div class="no-proposals">
          <div class="no-proposals-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <h3>No projects posted</h3>
          <p>Post your first project and start receiving proposals from skilled freelancers.</p>
          <a href="post-project.html" class="btn btn-primary" style="margin-top:4px;">Post a Project</a>
        </div>`;
      return;
    }

    el.innerHTML = jobs.map(job => `
      <div class="posted-job-card">
        <div class="posted-job-header">
          <div>
            <div class="posted-job-title">${job.title}</div>
            <div class="posted-job-meta">
              ${job.category} &bull; ${job.budget} &bull; Timeline: ${job.deadline}
            </div>
          </div>
          <span class="proposals-count-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            ${job.proposals} proposal${job.proposals !== 1 ? 's' : ''}
          </span>
        </div>
        <p style="font-size:0.88rem;color:var(--secondary-text);margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
          ${job.description}
        </p>
        <div style="margin-top:12px;font-size:0.8rem;color:#999;">Posted ${timeAgo(job.postedAt)}</div>
      </div>`).join('');
  }
  </script>
  <script src="js/footer.js"></script>
</body>
</html>
